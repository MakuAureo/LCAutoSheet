<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stat Tracker</title>
    <link rel="icon" type="image/x-icon" href="imgs/favicon.ico">

    <style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Share Tech Mono', monospace;
  background: #000 center/cover no-repeat;
}

  .card {
    background: rgba(0, 0, 0, 0.65);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 28px;
    width: min(680px, 90vw);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    backdrop-filter: blur(4px);
  }

  .top-row {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
  }

  #connect-btn {
    background: transparent;
    border: 2px solid #fff;
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 8px 32px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.2s, color 0.2s;
  }

  #connect-btn:hover  { background: rgba(255,255,255,0.1); }
  #connect-btn.active { border-color: #4ade80; color: #4ade80; }
  #connect-btn.error  { border-color: #f87171; color: #f87171; }

  #port-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
  }

  #port-input {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.7);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 2px 8px;
    width: 64px;
    border-radius: 4px;
    text-align: center;
    outline: none;
  }

  #port-input:focus { border-color: rgba(255,255,255,0.5); }

  #json-box {
    width: 100%;
    height: 360px;
    overflow-y: auto;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 16px 20px;
  }

  #json-content {
    font-size: 13px;
    line-height: 1.7;
    color: rgba(255,255,255,0.85);
    white-space: pre;
  }

  #json-content.placeholder {
    color: rgba(255,255,255,0.25);
    font-style: italic;
    white-space: normal;
  }

  .jk { color: #79c0ff; }
  .js { color: #a5d6ff; }
  .jn { color: #4ade80; }
  .jb { color: #f87171; }
  .jz { color: #8b949e; }
    </style>
  </head>

  <body>

    <div class="card">
      <div class="top-row">
        <button id="connect-btn" onclick="toggle()">Connect</button>
      </div>

      <div id="port-row">
        PORT: <input id="port-input" type="text" value="2145">
      </div>

      <div id="json-box">
        <div id="json-content" class="placeholder">
          No data yet — press Connect to start listening.
        </div>
      </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async></script>
    <script src="src/config.js"></script>
    <script src="src/autosheet.js" defer></script>
    <script src="src/jsondisplay.js" defer></script>

  </body>
</html>
